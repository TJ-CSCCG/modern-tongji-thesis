name: Release

on:
  push:
    branches: [main, dev]
    paths:
      - 'paddling-tongji-thesis/**'
      - 'init-files/**'
      - 'figures/**'
      - '.github/workflows/release.yml'
      - '.github/patches/**'
      - '.github/bin/**'
      - 'typst.toml'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [main, dev]
    paths:
      - 'paddling-tongji-thesis/**'
      - 'init-files/**'
      - '.github/workflows/release.yml'
      - '.github/patches/**'
      - '.github/bin/**'
      - 'typst.toml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        field: [science, humanities]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: '^0.14.0'

      - name: Download fonts (Fandol + TeX Gyre Termes + HaranoAjiMincho)
        run: |
          mkdir -p fonts
          curl -sL "https://mirrors.ctan.org/fonts/fandol.zip" -o fandol.zip
          unzip -q fandol.zip -d fonts
          find fonts -name "*.otf" -exec mv {} fonts/ \;
          rm -rf fonts/fandol fandol.zip
          curl -sL "https://mirrors.ctan.org/fonts/tex-gyre.zip" -o tgt.zip
          unzip -q tgt.zip -d fonts
          find fonts -name "texgyretermes*.otf" -exec mv {} fonts/ \;
          rm -rf fonts/tex-gyre tgt.zip
          curl -sL "https://mirrors.ctan.org/fonts/haranoaji.zip" -o haji.zip
          unzip -q haji.zip -d fonts
          find fonts -name "HaranoAjiMincho*.otf" -exec mv {} fonts/ \;
          rm -rf fonts/haranoaji haji.zip

      - name: Configure humanities variant
        if: matrix.field == 'humanities'
        run: |
          sed -i 's/field: "science"/field: "humanities"/' init-files/main.typ

      - name: Compile thesis
        run: |
          typst compile init-files/main.typ thesis.pdf --root . --font-path ./fonts

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' typst.toml | head -1 | sed 's/.*= "//;s/"//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Rename PDF
        if: success()
        run: |
          mv thesis.pdf TongjiThesis-typst-v${{ steps.version.outputs.version }}-${{ matrix.field }}.pdf

      - name: Upload PDF
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: release-pdf-${{ matrix.field }}
          path: TongjiThesis-typst-v*.pdf
          retention-days: 90

  prepare-package:
    # On every push to main: create a patched 'package' branch for Typst Universe submission.
    # Replaces local imports (../paddling-tongji-thesis/) with @preview imports,
    # then force-pushes to the 'package' branch.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

      - name: Apply patch and push to package branch
        run: |
          chmod +x .github/bin/package_release.sh
          .github/bin/package_release.sh

  release:
    needs: build-release
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' typst.toml | head -1 | sed 's/.*= "//;s/"//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release PDFs
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v7
        with:
          pattern: release-pdf-*
          merge-multiple: true

      - name: Get previous version
        if: steps.check.outputs.exists == 'false'
        id: prev
        run: |
          PREV=$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"
          echo "version=${PREV#v}" >> "$GITHUB_OUTPUT"
          echo "Previous release: ${PREV:-none}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create source archive
        if: steps.check.outputs.exists == 'false'
        run: |
          EXCLUDES=".git .github patches bin fonts"
          for e in $EXCLUDES; do EXC="$EXC --exclude=$e"; done
          tar -czf "paddling-tongji-thesis-v${{ steps.version.outputs.version }}.tar.gz" $EXC .
          echo "Source archive created"

      - name: Read release template
        if: steps.check.outputs.exists == 'false'
        id: template
        run: |
          BODY=$(sed \
            -e "s/PREV_VERSION_TOKEN/${{ steps.prev.outputs.version }}/g" \
            -e "s/VERSION_TOKEN/${{ steps.version.outputs.version }}/g" \
            .github/release_template.md)
          if [ -z "${{ steps.prev.outputs.version }}" ]; then
            BODY=$(echo "$BODY" | sed '/PREV_VERSION_TOKEN\|完整对比\|Full changelog/d')
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "paddling-tongji-thesis v${{ steps.version.outputs.version }}"
          body: ${{ steps.template.outputs.body }}
          files: |
            TongjiThesis-typst-v${{ steps.version.outputs.version }}-science.pdf
            TongjiThesis-typst-v${{ steps.version.outputs.version }}-humanities.pdf
            paddling-tongji-thesis-v${{ steps.version.outputs.version }}.tar.gz
          draft: true
          prerelease: false
          fail_on_unmatched_files: false
          make_latest: true
